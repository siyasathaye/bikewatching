<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bikewatching</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="map.css" />
    <script src="map.js" type="module"></script>
  </head>
  <body>
    <header>
      <div>
        <h1>🚲 Bikewatching</h1>
        <p>
          An interactive map of Boston-area Bluebikes traffic, station activity,
          and bike lane patterns throughout the day.
        </p>
      </div>
      <label class="time-filter" for="time-slider">
        Filter by time:
        <input id="time-slider" type="range" min="-1" max="1439" value="-1" />
        <time id="selected-time"></time>
        <em id="any-time">(any time)</em>
      </label>
    </header>

    <main>
      <div id="map">
        <svg aria-hidden="true"></svg>
      </div>
      <div class="legend">
        <div style="--legend-color: steelblue">More departures</div>
        <div style="--legend-color: darkorange">Balanced</div>
        <div style="--legend-color: hotpink">More arrivals</div>
      </div>
    </main>
  </body>
</html>
